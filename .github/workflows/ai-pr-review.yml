name: AI PR Code Review

on:
  pull_request:
    # 新增 review_requested 嚟取代原本無效嘅 event
    types: [opened, synchronize, ready_for_review, review_requested]

jobs:
  dify_ai_review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 需要完整歷史以便進行 diff

      - name: Extract PR Diff
        id: get_diff
        run: |
          # 取得目前 PR 的 diff
          git diff origin/${{ github.event.pull_request.base.ref }}...origin/${{ github.event.pull_request.head.ref }} > pr_diff.txt
          echo "diff_path=pr_diff.txt" >> $GITHUB_ENV

      - name: Send to Dify API & Get Response
        id: dify_api
        env:
          DIFY_API_URL: "https://api.dify.ai/v1/workflows/run"
          DIFY_API_KEY: ${{ secrets.DIFY_CODE_REVIEW_API_KEY }}
        run: |
          # 1. 檢查 diff 檔案是否存在及是否有內容
          if [ ! -s pr_diff.txt ]; then
            echo "pr_diff.txt is empty or does not exist. Skipping Dify API call."
            echo "No changes found." > review_result.md
            exit 0
          fi

          PR_URL="https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          
          # 2. 使用 jq 安全地構建 JSON Payload，避免轉義問題
          JSON_PAYLOAD=$(jq -n \
            --arg diff "$(cat pr_diff.txt)" \
            --arg url "$PR_URL" \
            '{
              "inputs": {
                "pr_diff": $diff,
                "pr_url": $url
              },
              "response_mode": "blocking",
              "user": "github-actions-bot"
            }')

          # 3. 呼叫 Dify API，加上 -f 參數，如果有 HTTP 錯誤會直接失敗
          echo "Sending request to Dify API..."
          RESPONSE=$(curl -s -f -X POST "$DIFY_API_URL" \
            -H "Authorization: Bearer $DIFY_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD") || {
              echo "Error: Dify API call failed. Response: $RESPONSE"
              exit 1
            }
            
          # 4. 打印 API 回應以便除錯 (可選)
          echo "Dify API Response: $RESPONSE"
            
          # 5. 解析 Dify 回傳的 JSON
          REVIEW_COMMENT=$(echo "$RESPONSE" | jq -r '.data.outputs.review_result // "未能產生審查結果或發生錯誤。"')
          echo "$REVIEW_COMMENT" > review_result.md

      - name: Comment on GitHub PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 使用 GitHub CLI 在 PR 上留下 Markdown 評論
          gh pr comment ${{ github.event.pull_request.number }} --body-file review_result.md
